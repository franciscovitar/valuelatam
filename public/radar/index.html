<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Value Latam Radar — Acceso</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2371B8E3'/><text y='22' x='5' font-size='18' font-family='monospace' font-weight='700' fill='%23000'>VR</text></svg>">
  <script src="firebase-config.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'IBM Plex Sans', ui-sans-serif, sans-serif;
      font-size: 13px;
      font-weight: 300;
      background: #0E0E0E;
      color: #888;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* LOADING */
    #loading {
      position: fixed; inset: 0;
      background: #0E0E0E;
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
    }
    .spinner {
      width: 24px; height: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      border-top-color: #71B8E3;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .wrap {
      width: 100%;
      max-width: 360px;
    }

    /* BRAND */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }
    .brand-mark {
      width: 28px; height: 28px;
      background: #71B8E3;
      border-radius: 4px;
      display: grid; place-items: center;
      color: #000;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 500;
      font-size: 11px;
      flex: 0 0 28px;
    }
    .brand-name {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #E8E8E8;
      letter-spacing: -0.02em;
    }
    .brand-sub {
      font-size: 10px;
      color: #444;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    h1 {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: #E8E8E8;
      letter-spacing: -0.025em;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #555;
      margin-bottom: 28px;
    }

    /* FORM */
    .form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: 10px;
      font-weight: 500;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #555;
    }
    .field input {
      height: 38px;
      padding: 0 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      color: #E8E8E8;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      transition: border 120ms;
      width: 100%;
    }
    .field input::placeholder { color: #333; }
    .field input:focus {
      outline: none;
      border-color: #71B8E3;
    }

    .btn-login {
      height: 40px;
      background: #71B8E3;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 120ms;
      letter-spacing: 0.02em;
      margin-top: 4px;
    }
    .btn-login:hover { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      display: none;
      padding: 10px 12px;
      border: 1px solid rgba(248,113,113,0.25);
      border-left: 3px solid #F87171;
      border-radius: 4px;
      font-size: 11px;
      color: #F87171;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }
    .divider span {
      font-size: 10px;
      color: #333;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* SOLICITUD LINK */
    .btn-solicitud {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 38px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      color: #888;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 120ms;
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .btn-solicitud:hover {
      border-color: rgba(113,184,227,0.35);
      color: #71B8E3;
    }

    /* FOOTER */
    .footer {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10px;
      color: #333;
      font-family: 'IBM Plex Mono', monospace;
      text-align: center;
    }
    .footer a { color: #444; text-decoration: none; }
    .footer a:hover { color: #71B8E3; }

    /* Mensaje de acceso denegado desde URL param */
    .info-msg {
      display: none;
      padding: 10px 12px;
      border: 1px solid rgba(234,179,8,0.25);
      border-left: 3px solid #EAB308;
      border-radius: 4px;
      font-size: 11px;
      color: #EAB308;
      font-family: 'IBM Plex Mono', monospace;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

<!-- Loading mientras verifica auth -->
<div id="loading"><div class="spinner"></div></div>

<div class="wrap" style="display:none;" id="main">

  <div class="brand">
    <div class="brand-mark">VR</div>
    <div>
      <div class="brand-name">Value Radar</div>
      <div class="brand-sub">Latam · PyME</div>
    </div>
  </div>

  <div class="info-msg" id="info-msg"></div>

  <h1>Ingresá a tu cuenta</h1>
  <p class="subtitle">Dashboard financiero para PyMEs argentinas</p>

  <div class="form">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="usuario@empresa.com"
        onkeydown="if(event.key==='Enter')document.getElementById('pass').focus()">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-login" onclick="doLogin()" id="btn-login">
      Ingresar →
    </button>
  </div>

  <div class="divider"><span>¿No tenés cuenta?</span></div>

  <a href="solicitud.html" class="btn-solicitud">
    Solicitar acceso a Value Latam Radar
  </a>

  <div class="footer">
    <a href="mailto:mauricio@valuelatam.com">mauricio@valuelatam.com</a>
    &nbsp;·&nbsp; Value Latam © 2026
  </div>

</div>

<script>
  const auth = firebase.auth();
  const ADMIN_EMAIL = 'mauricio@valuelatam.com';

  // Verificar si ya hay sesión activa
  auth.onAuthStateChanged(user => {
    document.getElementById('loading').style.display = 'none';
    if(user){
      // Ya logueado — redirigir según rol
      if(user.email === ADMIN_EMAIL){
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'app.html';
      }
      return;
    }
    // No logueado — mostrar form
    document.getElementById('main').style.display = 'block';

    // Verificar parámetros de URL (ej: ?acceso=denegado)
    const params = new URLSearchParams(window.location.search);
    const infoEl = document.getElementById('info-msg');
    if(params.get('acceso') === 'denegado'){
      infoEl.style.display = 'block';
      infoEl.textContent = 'Tu sesión no tiene acceso a esa sección.';
    }
    if(params.get('sesion') === 'cerrada'){
      infoEl.style.display = 'block';
      infoEl.textContent = 'Sesión cerrada correctamente.';
      infoEl.style.borderLeftColor = '#3DD68C';
      infoEl.style.color = '#3DD68C';
    }

    // Focus en email
    setTimeout(()=>{ document.getElementById('email').focus(); }, 100);
  });

  async function doLogin(){
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('pass').value;
    const btn   = document.getElementById('btn-login');
    const errEl = document.getElementById('error-msg');

    if(!email || !pass){
      showError('Completá email y contraseña');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    errEl.style.display = 'none';

    try {
      await auth.signInWithEmailAndPassword(email, pass);
      // onAuthStateChanged maneja la redirección
    } catch(e){
      btn.disabled = false;
      btn.textContent = 'Ingresar →';
      const msgs = {
        'auth/user-not-found':   'No existe una cuenta con ese email',
        'auth/wrong-password':   'Contraseña incorrecta',
        'auth/invalid-email':    'El email no es válido',
        'auth/too-many-requests':'Demasiados intentos. Esperá unos minutos',
        'auth/user-disabled':    'Esta cuenta está deshabilitada',
        'auth/invalid-credential': 'Email o contraseña incorrectos',
      };
      showError(msgs[e.code] || 'Error al ingresar: ' + e.message);
    }
  }

  function showError(msg){
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
